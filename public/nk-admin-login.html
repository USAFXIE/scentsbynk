<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login — NK. SCENTS</title>
  <link rel="icon" href="./images/favicon.png">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <img src="./images/logo.png" alt="NK. SCENTS" class="login-logo">
      <h1 class="login-title">Admin Portal</h1>
      <p class="login-sub">Secure access — authorised personnel only</p>
      <div class="login-error" id="login-error">Invalid username or password.</div>
      <form id="login-form">
        <div class="form-group" style="text-align:left">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username" autocomplete="username" required
            placeholder="admin">
        </div>
        <div class="form-group" style="text-align:left;margin-bottom:28px">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" autocomplete="current-password"
            required placeholder="••••••••">
        </div>
        <button class="btn btn-gold btn-full" type="submit" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>
  <script src="./js/admin-auth.js"></script>
</body>

</html>
